---
- name: New Relic - Go services (account-service, payment-service)
  hosts: navalansible
  gather_facts: false
  tasks:
    - ansible.builtin.include_role:
        name: navalansible
        tasks_from: nr-go-services.yml
      when: newrelic_license_key is defined and newrelic_license_key | length > 0
