---
# Run only the populate tasks (ImagePopulator)
# Run: python3 -m ansible playbook playbooks/populate-only.yml -e "ansible_host=<vm_ip>" -e "vm_admin_password=..."

- name: Populate ship images (ImagePopulator)
  hosts: navalansible
  gather_facts: true
  vars:
    run_image_populator: true
  tasks:
    - name: Include populate tasks from navalansible role
      ansible.builtin.include_role:
        name: navalansible
        tasks_from: populate.yml
