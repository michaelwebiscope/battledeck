---
# After the infra agent runs, optional PostgreSQL on-host monitoring (nri-postgresql) is configured
# when newrelic_postgres_monitor_password is set. Install the PostgreSQL integration MSI on Windows if needed:
# https://docs.newrelic.com/docs/infrastructure/host-integrations/installation/install-infrastructure-host-integrations/#install-windows
- name: New Relic - infrastructure, logs, and .NET APM
  hosts: navalansible
  gather_facts: true
  vars:
    targets:
      - infrastructure
      - logs
      - apm-dotnet
    install_timeout_seconds: 900
  environment:
    NEW_RELIC_API_KEY: "{{ newrelic_api_key }}"
    NEW_RELIC_ACCOUNT_ID: "{{ newrelic_account_id }}"
    NEW_RELIC_REGION: "{{ newrelic_region | default('US') }}"
  tasks:
    - name: Install infrastructure, logs, and .NET APM agent
      ansible.builtin.include_role:
        name: newrelic.newrelic_install
      ignore_errors: true

    - name: Deploy New Relic PostgreSQL integration config (optional)
      ansible.builtin.include_role:
        name: navalansible
        tasks_from: newrelic_postgresql_integration
