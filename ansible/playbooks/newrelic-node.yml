---
- name: New Relic - Node.js (NavalArchiveWeb)
  hosts: navalansible
  gather_facts: false
  vars_files:
    - ../roles/navalansible/vars/main.yml
  tasks:
    - name: Install New Relic Node.js package
      ansible.windows.win_shell: |
        Push-Location "{{ web_path }}"
        & "{{ node_dir }}\npm.cmd" install newrelic --omit=dev --no-audit --no-fund
        Pop-Location
      args:
        executable: powershell
      when: newrelic_license_key is defined and newrelic_license_key | length > 0

    - name: Add New Relic vars to NavalArchiveWeb service registry
      ansible.windows.win_shell: |
        $regPath = "HKLM:\SYSTEM\CurrentControlSet\Services\NavalArchiveWeb"
        if (Test-Path $regPath) {
          $current = (Get-ItemProperty -Path $regPath -Name "Environment" -ErrorAction SilentlyContinue).Environment
          $updated = @($current | Where-Object { $_ -notlike "NEW_RELIC_*" -and $_ -notlike "NODE_OPTIONS=*" })
          $updated += @(
            "NEW_RELIC_LICENSE_KEY={{ newrelic_license_key }}",
            "NEW_RELIC_APP_NAME={{ newrelic_node_app_name | default('NavalArchiveWeb') }}",
            "NEW_RELIC_NO_CONFIG_FILE=true",
            "NEW_RELIC_DISTRIBUTED_TRACING_ENABLED=true",
            "NEW_RELIC_INFINITE_TRACING_TRACE_OBSERVER_HOST={{ newrelic_trace_observer_host }}",
            "NEW_RELIC_BROWSER_MONITOR_ENABLE=true",
            "NODE_OPTIONS=-r {{ web_path }}\node_modules\newrelic\index.js"
          )
          Set-ItemProperty -Path $regPath -Name "Environment" -Value $updated -Type MultiString -Force
        }
      args:
        executable: powershell
      when: newrelic_license_key is defined and newrelic_license_key | length > 0

    - name: Update start-node-web.ps1 with NR env vars
      ansible.windows.win_copy:
        content: |
          $env:API_URL = "http://localhost:5000"
          $env:GATEWAY_URL = "http://localhost:5010"
          $env:PORT = "3000"
          $env:NEW_RELIC_LICENSE_KEY = "{{ newrelic_license_key }}"
          $env:NEW_RELIC_APP_NAME = "{{ newrelic_node_app_name | default('NavalArchiveWeb') }}"
          $env:NEW_RELIC_NO_CONFIG_FILE = "true"
          $env:NEW_RELIC_DISTRIBUTED_TRACING_ENABLED = "true"
          $env:NEW_RELIC_INFINITE_TRACING_TRACE_OBSERVER_HOST = "{{ newrelic_trace_observer_host }}"
          $env:NEW_RELIC_BROWSER_MONITOR_ENABLE = "true"
          $env:NODE_OPTIONS = "-r {{ web_path }}\node_modules\newrelic\index.js"
          Set-Location "{{ web_path }}"
          & "{{ node_dir }}\node.exe" server.js
        dest: C:\inetpub\start-node-web.ps1
      when: newrelic_license_key is defined and newrelic_license_key | length > 0

    # Production Node is started via NavalArchiveWeb-Node + C:\inetpub\start-node-web.ps1 (see scheduled_task.yml).
    # Do NOT restart the NavalArchiveWeb Windows service here: sc/stop often blocks WinRM and services.yml noted
    # service start timeout (1053). Recycling the scheduled task reloads the updated script + NR env vars.
    - name: Restart NavalArchiveWeb-Node scheduled task with updated start-node-web.ps1
      ansible.windows.win_shell: |
        Stop-ScheduledTask -TaskName "NavalArchiveWeb-Node" -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 3
        Start-ScheduledTask -TaskName "NavalArchiveWeb-Node" -ErrorAction SilentlyContinue
      args:
        executable: powershell
      failed_when: false
      when: newrelic_license_key is defined and newrelic_license_key | length > 0
