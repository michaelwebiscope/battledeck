---
# Clone GitHub repo via git. First run: shallow clone. Subsequent runs: fetch + reset.
# Sets code_changed=true if HEAD moved (or first clone), so build.yml can skip unchanged deploys.

- name: Parse repo URL for owner and repo name
  ansible.builtin.set_fact:
    repo_owner: "{{ (github_repo_url | regex_replace('\\.git$', '') | regex_replace('/$', '')).split('/')[-2] }}"
    repo_name: "{{ (github_repo_url | regex_replace('\\.git$', '') | regex_replace('/$', '')).split('/')[-1] }}"

- name: Build authenticated git clone URL
  ansible.builtin.set_fact:
    git_clone_url: "{{ 'https://' + github_token + '@github.com/' + repo_owner + '/' + repo_name + '.git' if (github_token is defined and github_token | length > 0) else github_repo_url }}"

- name: Check if repo already cloned
  ansible.windows.win_stat:
    path: "{{ clone_path }}\\.git"
  register: git_dir

- name: Remove leftover clone dir if not a git repo (e.g. from a failed previous clone)
  ansible.windows.win_file:
    path: "{{ clone_path }}"
    state: absent
  when: not git_dir.stat.exists

- name: Git clone (first run - shallow)
  ansible.windows.win_shell: |
    $env:Path = [Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [Environment]::GetEnvironmentVariable("Path","User")
    git clone "{{ git_clone_url }}" "{{ clone_path }}" --branch {{ github_repo_branch }} --depth 10
    exit $LASTEXITCODE
  args:
    executable: powershell
  when: not git_dir.stat.exists

- name: Git fetch and detect changes (subsequent runs)
  ansible.windows.win_shell: |
    $env:Path = [Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [Environment]::GetEnvironmentVariable("Path","User")
    cd "{{ clone_path }}"
    $before = git rev-parse HEAD
    git fetch origin {{ github_repo_branch }} --depth 10
    git reset --hard origin/{{ github_repo_branch }}
    $after = git rev-parse HEAD
    if ($before -ne $after) {
        Write-Output "changed"
        $diff = git diff --name-only $before $after 2>$null
        if ($LASTEXITCODE -eq 0) {
            Write-Output $diff
        } else {
            Write-Output "ALL_COMPONENTS"
        }
    } else {
        Write-Output "unchanged"
    }
  args:
    executable: powershell
  register: git_pull_result
  when: git_dir.stat.exists

- name: Set per-component change facts
  ansible.builtin.set_fact:
    code_changed: >-
      {{ not git_dir.stat.exists or
         'changed' in (git_pull_result.stdout_lines | first | default('changed')) }}
    api_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Api/' in (git_pull_result.stdout | default('')) }}
    web_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Web/' in (git_pull_result.stdout | default('')) }}
    payment_sim_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.PaymentSimulation/' in (git_pull_result.stdout | default('')) }}
    card_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.CardService/' in (git_pull_result.stdout | default('')) }}
    cart_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.CartService/' in (git_pull_result.stdout | default('')) }}
    go_payment_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'payment-service/' in (git_pull_result.stdout | default('')) }}
    go_account_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'account-service/' in (git_pull_result.stdout | default('')) }}
    image_populator_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.ImagePopulator/' in (git_pull_result.stdout | default('')) }}
    chain_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Gateway/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Auth/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.UserService/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Catalog/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Inventory/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Basket/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Order/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Payment/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Shipping/' in (git_pull_result.stdout | default('')) or
         'NavalArchive.Notification/' in (git_pull_result.stdout | default('')) }}
    ansible_changed: >-
      {{ not git_dir.stat.exists or
         'ALL_COMPONENTS' in (git_pull_result.stdout | default('')) or
         'ansible/' in (git_pull_result.stdout | default('')) }}

- name: Set src_path to clone directory
  ansible.builtin.set_fact:
    src_path: "{{ clone_path }}"
