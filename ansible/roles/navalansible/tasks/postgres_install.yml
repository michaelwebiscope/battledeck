---
# Heavy download — keep in its own staged playbook so WinRM reconnects after install.
# Check via Windows Service — faster and more reliable than choco list (no network, no PATH issues).
- name: Check if PostgreSQL service already exists
  ansible.windows.win_service_info:
    name: "postgresql*"
  register: pg_service_info

- name: Install PostgreSQL 16 via Chocolatey
  ansible.windows.win_shell: |
    $env:Path = [Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [Environment]::GetEnvironmentVariable("Path","User")
    choco install postgresql16 -y --no-progress --params "/Password:postgres_admin" --timeout 600
    if ($LASTEXITCODE -ne 0) { throw "choco install postgresql16 failed with exit code $LASTEXITCODE" }
  args:
    executable: powershell
  when: pg_service_info.services | length == 0
