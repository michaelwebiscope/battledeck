---
# Install PostgreSQL 16 from official ZIP binaries (no Chocolatey, no EDB installer).
# .NET ZipFile extract: ~3.5 min vs ~10 min with Chocolatey on a 4GB VM.
- name: Check if PostgreSQL binaries already exist
  ansible.windows.win_stat:
    path: 'C:\Program Files\PostgreSQL\16\bin\psql.exe'
  register: pg_bin_exists

- name: Download and extract PostgreSQL 16 ZIP binaries
  ansible.windows.win_shell: |
    $pgDir = 'C:\Program Files\PostgreSQL\16'
    $zip = "{{ ansible_env.TEMP }}\pg16.zip"
    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
    (New-Object Net.WebClient).DownloadFile('https://get.enterprisedb.com/postgresql/postgresql-16.8-1-windows-x64-binaries.zip', $zip)
    New-Item -ItemType Directory -Force -Path $pgDir | Out-Null
    Add-Type -Assembly System.IO.Compression.FileSystem
    $extractDir = "{{ ansible_env.TEMP }}\pg16x"
    if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
    [System.IO.Compression.ZipFile]::ExtractToDirectory($zip, $extractDir)
    Copy-Item "$extractDir\pgsql\*" -Destination $pgDir -Recurse -Force
    Remove-Item $zip, $extractDir -Recurse -Force -ErrorAction SilentlyContinue
    $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
    if ($path -notlike "*PostgreSQL*") {
      [Environment]::SetEnvironmentVariable("Path", "$path;$pgDir\bin", "Machine")
    }
  args:
    executable: powershell
  async: 600
  poll: 15
  when: not pg_bin_exists.stat.exists
