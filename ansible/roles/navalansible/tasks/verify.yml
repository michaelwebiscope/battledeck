---
# Verify API and Web are responding
# All tasks use ignore_unreachable so WinRM drops don't kill the deploy.

- name: Restart NavalArchiveWeb (may timeout - Node slow to start)
  ansible.windows.win_shell: |
    sc.exe stop NavalArchiveWeb 2>$null
    Start-Sleep -Seconds 3
    sc.exe start NavalArchiveWeb 2>$null
  args:
    executable: powershell
  async: 60
  poll: 5
  failed_when: false
  ignore_unreachable: true

- name: Wait for API /health (lightweight, no DB)
  ansible.windows.win_uri:
    url: http://localhost:5000/health
    method: GET
    status_code: 200
    timeout: 5
  register: api_health
  until: api_health.status_code | default(0) == 200
  retries: 12
  delay: 5
  ignore_errors: true
  ignore_unreachable: true

- name: Check API /api/health (DB connectivity)
  ansible.windows.win_uri:
    url: http://localhost:5000/api/health
    method: GET
    status_code: 200
    timeout: 10
    return_content: true
  register: api_db_check
  retries: 6
  delay: 5
  until: api_db_check.status_code | default(0) == 200
  ignore_errors: true
  ignore_unreachable: true

- name: Check API /api/ships (data endpoint)
  ansible.windows.win_uri:
    url: http://localhost:5000/api/ships?page=1&pageSize=1
    method: GET
    status_code: 200
    timeout: 10
  register: api_ships_check
  ignore_errors: true
  ignore_unreachable: true

- name: Wait for Node to respond (retry up to 12 times, 5s apart = 60s max)
  ansible.windows.win_uri:
    url: http://localhost:3000/
    method: GET
    timeout: 5
  register: web_check
  until: web_check.status_code | default(0) == 200
  retries: 12
  delay: 5
  ignore_errors: true
  ignore_unreachable: true

- name: Check ImagePopulator listener health
  ansible.windows.win_uri:
    url: "http://localhost:{{ image_populator_port | default(5099) }}/health"
    method: GET
    timeout: 5
  register: populator_check
  ignore_errors: true
  ignore_unreachable: true

- name: Report status
  ansible.builtin.debug:
    msg: >-
      API health: {{ 'OK' if api_health.status_code | default(0) == 200 else 'FAIL' }} |
      API DB: {{ 'OK' if api_db_check.status_code | default(0) == 200 else 'FAIL - check C:\inetpub\navalarchive-api\logs\stdout*.log' }} |
      API /api/ships: {{ 'OK' if api_ships_check.status_code | default(0) == 200 else 'FAIL (' + (api_ships_check.status_code | default('N/A') | string) + ')' }} |
      Web: {{ 'OK' if web_check.status_code | default(0) == 200 else 'Check manually' }} |
      ImagePopulator: {{ 'OK' if populator_check.status_code | default(0) == 200 else 'Check manually' }}

- name: Warn if API DB check failed
  ansible.builtin.debug:
    msg: >-
      WARNING: API database connectivity check failed.
      Check stdout logs at C:\inetpub\navalarchive-api\logs\stdout*.log for exceptions.
      Common causes: DB file permissions, locked DB, or schema migration error.
      Response: {{ api_db_check.content | default('no response') }}
  when: api_db_check.status_code | default(0) != 200
