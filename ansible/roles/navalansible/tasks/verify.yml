---
# Verify API and Web are responding

- name: Restart NavalArchiveWeb (may timeout - Node slow to start)
  ansible.windows.win_shell: |
    sc.exe stop NavalArchiveWeb 2>$null
    Start-Sleep -Seconds 3
    sc.exe start NavalArchiveWeb 2>$null
  args:
    executable: powershell
  failed_when: false

- name: Wait for API to be ready
  ansible.windows.win_uri:
    url: http://localhost:5000/trace
    method: GET
    status_code: 200
    timeout: 5
  register: api_check
  until: api_check.status_code | default(0) == 200
  retries: 12
  delay: 5
  ignore_errors: true

- name: Wait for Node to respond (retry up to 12 times, 5s apart = 60s max)
  ansible.windows.win_uri:
    url: http://localhost:3000/
    method: GET
    timeout: 5
  register: web_check
  until: web_check.status_code | default(0) == 200
  retries: 12
  delay: 5
  ignore_errors: true

- name: Check ImagePopulator listener health
  ansible.windows.win_uri:
    url: "http://localhost:{{ image_populator_port | default(5099) }}/health"
    method: GET
    timeout: 5
  register: populator_check
  ignore_errors: true

- name: Report status
  ansible.builtin.debug:
    msg: >-
      API: {{ 'OK' if api_check.status_code | default(0) == 200 else 'Check manually' }} |
      Web: {{ 'OK' if web_check.status_code | default(0) == 200 else 'Check manually' }} |
      ImagePopulator listener: {{ 'OK' if populator_check.status_code | default(0) == 200 else 'Check manually' }}
