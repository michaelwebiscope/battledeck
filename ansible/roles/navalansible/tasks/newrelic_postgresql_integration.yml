---
# Deploy nri-postgresql config for New Relic infrastructure agent (Windows).
# Invoked only from playbooks/newrelic-infra.yml (e.g. ./deploy-navalansible.sh -newrelic or -fullrun).
# Requires: nri-postgresql MSI/package on the host. Set newrelic_postgres_monitor_password in tfvars.

- name: New Relic PostgreSQL on-host integration (DB user + config + agent restart)
  when: newrelic_postgres_monitor_password | default('') | length > 0
  block:
    - name: Write SQL script for New Relic monitoring role (new_relic)
      ansible.windows.win_template:
        src: new_relic_monitor_role.sql.j2
        dest: C:\Windows\Temp\new_relic_monitor_role.sql

    - name: Apply New Relic monitoring user (new_relic) in PostgreSQL
      ansible.windows.win_shell: |
        $env:PGPASSWORD = 'postgres_admin'
        if (!(Test-Path 'C:\Program Files\PostgreSQL\16\bin\psql.exe')) { exit 0 }
        & 'C:\Program Files\PostgreSQL\16\bin\psql.exe' -U postgres -v ON_ERROR_STOP=1 -f 'C:\Windows\Temp\new_relic_monitor_role.sql'
      args:
        executable: powershell
      ignore_errors: true

    - name: Ensure New Relic integrations.d directory exists
      ansible.windows.win_file:
        path: 'C:\Program Files\New Relic\newrelic-infra\integrations.d'
        state: directory

    - name: Deploy postgresql-config.yml for New Relic
      ansible.windows.win_template:
        src: newrelic_postgresql_config.yml.j2
        dest: 'C:\Program Files\New Relic\newrelic-infra\integrations.d\postgresql-config.yml'

    - name: Restart New Relic infrastructure agent to load PostgreSQL integration
      ansible.windows.win_service:
        name: newrelic-infra
        state: restarted
      ignore_errors: true
