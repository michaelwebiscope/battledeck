---
# Create and start Windows services. Pure app deploy — zero observability.
# NR/OTEL instrumentation is layered on by newrelic.yml (run with -newrelic flag).

# --- Node (NavalArchiveWeb) ---
- name: Create NavalArchiveWeb service (Node)
  ansible.windows.win_shell: |
    sc.exe stop NavalArchiveWeb 2>$null
    sc.exe delete NavalArchiveWeb 2>$null
    Start-Sleep -Seconds 2
    $nodeShort = (New-Object -ComObject Scripting.FileSystemObject).GetFile("{{ node_dir }}\node.exe").ShortPath
    $webShort = (New-Object -ComObject Scripting.FileSystemObject).GetFolder("{{ web_path }}").ShortPath
    sc.exe create NavalArchiveWeb binPath= "$nodeShort $webShort\server.js" start= auto
    sc.exe failure NavalArchiveWeb reset= 86400 actions= restart/60000/restart/60000/restart/60000
    Start-Sleep -Seconds 1
    $envVars = @(
      "API_URL=http://localhost:5000",
      "GATEWAY_URL=http://localhost:5010",
      "PORT=3000"
    )
    Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\NavalArchiveWeb" -Name "Environment" -Value $envVars -Type MultiString -Force -ErrorAction SilentlyContinue
    sc.exe start NavalArchiveWeb
  args:
    executable: powershell
  async: 120
  poll: 5
  failed_when: false

# --- Java (ImagePopulator) ---
- name: Create run-image-populator-listener.ps1
  ansible.windows.win_template:
    src: run-image-populator-listener.ps1.j2
    dest: C:\inetpub\run-image-populator-listener.ps1

- name: Create NavalArchiveImagePopulator scheduled task
  ansible.windows.win_shell: |
    sc.exe stop NavalArchiveImagePopulator 2>$null
    sc.exe delete NavalArchiveImagePopulator 2>$null
    $taskName = "NavalArchiveImagePopulator"
    $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -ExecutionPolicy Bypass -File C:\inetpub\run-image-populator-listener.ps1"
    $trigger = New-ScheduledTaskTrigger -AtStartup -RandomDelay (New-TimeSpan -Minutes 2)
    $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
    $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -ExecutionTimeLimit (New-TimeSpan -Hours 0)
    Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
    Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
    Start-ScheduledTask -TaskName $taskName
  args:
    executable: powershell
  async: 60
  poll: 5

- name: Wait for ImagePopulator listener to be healthy
  ansible.windows.win_uri:
    url: "http://127.0.0.1:{{ image_populator_port }}/health"
    method: GET
    status_code: 200
    timeout: 5
  register: imagepopulator_health
  until: imagepopulator_health.status_code | default(0) == 200
  retries: 18
  delay: 5
  failed_when: false

- name: Report ImagePopulator listener health
  ansible.builtin.debug:
    msg: >-
      ImagePopulator listener:
      {{ 'healthy on port ' + (image_populator_port | string) if imagepopulator_health.status_code | default(0) == 200 else 'not responding on port ' + (image_populator_port | string) + ' after 90s' }}

# --- Go (account-service + payment-service) ---
- name: Create run-account-service.ps1
  ansible.windows.win_template:
    src: run-account-service.ps1.j2
    dest: "{{ account_path }}\\run-account-service.ps1"

- name: Create NavalArchiveAccount scheduled task
  ansible.windows.win_shell: |
    $taskName = "NavalArchiveAccount"
    $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NonInteractive -File `"{{ account_path }}\run-account-service.ps1`"" -WorkingDirectory "{{ account_path }}"
    $trigger = New-ScheduledTaskTrigger -AtStartup -RandomDelay (New-TimeSpan -Seconds 30)
    $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
    $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -ExecutionTimeLimit (New-TimeSpan -Hours 0) -RestartCount 999 -RestartInterval (New-TimeSpan -Minutes 1) -MultipleInstances IgnoreNew
    Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
    Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
    Start-ScheduledTask -TaskName $taskName
  args:
    executable: powershell
  async: 60
  poll: 5

- name: Wait for account-service to be healthy
  ansible.windows.win_uri:
    url: "http://127.0.0.1:5005/health"
    method: GET
    status_code: 200
    timeout: 5
  register: account_health
  until: account_health.status_code | default(0) == 200
  retries: 12
  delay: 5
  failed_when: false

- name: Create run-payment-service.ps1
  ansible.windows.win_template:
    src: run-payment-service.ps1.j2
    dest: "{{ payment_path }}\\run-payment-service.ps1"

- name: Create NavalArchivePayment scheduled task
  ansible.windows.win_shell: |
    sc.exe stop NavalArchivePayment 2>$null
    sc.exe delete NavalArchivePayment 2>$null
    $taskName = "NavalArchivePayment"
    $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -ExecutionPolicy Bypass -File `"{{ payment_path }}\run-payment-service.ps1`"" -WorkingDirectory "{{ payment_path }}"
    $trigger = New-ScheduledTaskTrigger -AtStartup -RandomDelay (New-TimeSpan -Minutes 1)
    $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
    $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -ExecutionTimeLimit (New-TimeSpan -Hours 0) -RestartCount 999 -RestartInterval (New-TimeSpan -Minutes 1) -MultipleInstances IgnoreNew
    Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
    Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
    Start-ScheduledTask -TaskName $taskName
  args:
    executable: powershell
  async: 60
  poll: 5

# --- Non-IIS services (Card, Cart, Order, PaymentChain, Shipping, Notification) ---
- name: Create non-IIS microservice
  ansible.windows.win_shell: |
    $outPath = "{{ chain_paths[item.path_key] }}"
    $exe = "{{ item.exe }}"
    $port = {{ item.port }}
    $svc = "{{ item.svc }}"
    if (Test-Path "$outPath\$exe") {
      sc.exe delete $svc 2>$null
      sc.exe create $svc binPath= "$outPath\$exe --urls=http://localhost:$port"
      sc.exe config $svc start= auto
      sc.exe failure $svc reset= 86400 actions= restart/60000/restart/60000/restart/60000
      sc.exe start $svc
    }
  args:
    executable: powershell
  async: 60
  poll: 5
  loop: "{{ chain_services }}"
  loop_control:
    label: "{{ item.svc }}"
  when: item.svc not in iis_hosted_service_names
