---
# Hot-swap Go service binaries without a full redeploy.
# Uses git clone/pull to get latest binaries — much faster than downloading the full zip.

- name: Parse repo URL for owner and repo name
  ansible.builtin.set_fact:
    repo_owner: "{{ (github_repo_url | regex_replace('\\.git$', '') | regex_replace('/$', '')).split('/')[-2] }}"
    repo_name: "{{ (github_repo_url | regex_replace('\\.git$', '') | regex_replace('/$', '')).split('/')[-1] }}"

- name: Build authenticated git clone URL
  ansible.builtin.set_fact:
    git_clone_url: "{{ 'https://' + github_token + '@github.com/' + repo_owner + '/' + repo_name + '.git' if (github_token is defined and github_token | length > 0) else github_repo_url }}"

- name: Check if repo already cloned
  ansible.windows.win_stat:
    path: "{{ clone_path }}\\.git"
  register: git_dir

- name: Remove leftover clone dir if not a git repo (e.g. from a failed previous clone)
  ansible.windows.win_file:
    path: "{{ clone_path }}"
    state: absent
  when: not git_dir.stat.exists

- name: Git clone (first run - shallow)
  ansible.windows.win_shell: |
    $env:Path = [Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [Environment]::GetEnvironmentVariable("Path","User")
    git clone "{{ git_clone_url }}" "{{ clone_path }}" --branch {{ github_repo_branch | default('main') }} --depth 1
    exit $LASTEXITCODE
  args:
    executable: powershell
  when: not git_dir.stat.exists

- name: Git fetch latest (subsequent runs)
  ansible.windows.win_shell: |
    $env:Path = [Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [Environment]::GetEnvironmentVariable("Path","User")
    cd "{{ clone_path }}"
    git fetch origin {{ github_repo_branch | default('main') }} --depth 1
    git reset --hard origin/{{ github_repo_branch | default('main') }}
    exit $LASTEXITCODE
  args:
    executable: powershell
  when: git_dir.stat.exists

- name: Stop Go service scheduled tasks and kill processes
  ansible.windows.win_shell: |
    Stop-ScheduledTask -TaskName "NavalArchiveAccount" -ErrorAction SilentlyContinue
    Stop-ScheduledTask -TaskName "NavalArchivePayment" -ErrorAction SilentlyContinue
    Start-Sleep -Seconds 2
    Get-Process -Name "account-service" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
    Get-Process -Name "payment-service" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
    foreach ($port in @(5005, 5001)) {
      $conn = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue
      if ($conn) { Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue }
    }
    Start-Sleep -Seconds 2
  args:
    executable: powershell

- name: Copy new account-service.exe
  ansible.windows.win_shell: |
    $src = Get-ChildItem "{{ clone_path }}" -Filter "account-service.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
    if ($src) {
      Copy-Item -Path $src.FullName -Destination "{{ account_path }}\account-service.exe" -Force
      Write-Output "Copied $($src.FullName)"
    } else {
      Write-Error "account-service.exe not found in repo"
    }
  args:
    executable: powershell

- name: Copy new payment-service.exe
  ansible.windows.win_shell: |
    $src = Get-ChildItem "{{ clone_path }}" -Filter "payment-service.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
    if ($src) {
      Copy-Item -Path $src.FullName -Destination "{{ payment_path }}\payment-service.exe" -Force
      Write-Output "Copied $($src.FullName)"
    } else {
      Write-Error "payment-service.exe not found in repo"
    }
  args:
    executable: powershell

- name: Update run-account-service.ps1
  ansible.windows.win_copy:
    content: |
      $env:HTTP_PORT = '5005'
      $env:DATABASE_URL = '{{ account_path }}\accounts.db'
      {% if newrelic_license_key is defined and newrelic_license_key | length > 0 %}
      $env:NEW_RELIC_LICENSE_KEY = '{{ newrelic_license_key }}'
      $env:NEW_RELIC_APP_NAME = '{{ newrelic_go_account_app_name | default("NavalArchiveAccount") }}'
      {% endif %}
      Set-Location '{{ account_path }}'
      & '{{ account_path }}\account-service.exe'
    dest: "{{ account_path }}\\run-account-service.ps1"

- name: Clear machine-level NR env vars left over from old account-service setup
  ansible.windows.win_environment:
    name: "{{ item }}"
    state: absent
    level: machine
  loop:
    - NEW_RELIC_APP_NAME
    - NEW_RELIC_LICENSE_KEY
  failed_when: false

- name: Update NavalArchiveAccount task to use PS1 wrapper
  ansible.windows.win_shell: |
    $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NonInteractive -File `"{{ account_path }}\run-account-service.ps1`"" -WorkingDirectory '{{ account_path }}'
    $settings = New-ScheduledTaskSettingsSet -RestartCount 999 -RestartInterval (New-TimeSpan -Minutes 1) -MultipleInstances IgnoreNew -ExecutionTimeLimit (New-TimeSpan -Hours 0)
    Set-ScheduledTask -TaskName 'NavalArchiveAccount' -Action $action -Settings $settings | Out-Null
    Write-Output "NavalArchiveAccount task updated"
  args:
    executable: powershell

- name: Update run-payment-service.ps1
  ansible.windows.win_copy:
    content: |
      $env:HTTP_PORT = '5001'
      $env:DATABASE_URL = '{{ payment_path }}\payment.db'
      $env:DATABASE_TYPE = 'sqlite'
      $env:USE_QUEUE = 'true'
      $env:ACCOUNT_SERVICE_URL = 'http://localhost:5005'
      $env:IDEMPOTENCY = 'db'
      {% if newrelic_license_key is defined and newrelic_license_key | length > 0 %}
      $env:NEW_RELIC_LICENSE_KEY = '{{ newrelic_license_key }}'
      $env:NEW_RELIC_APP_NAME = '{{ newrelic_go_payment_app_name | default("NavalArchivePayment") }}'
      {% endif %}
      Set-Location '{{ payment_path }}'
      & '{{ payment_path }}\payment-service.exe'
    dest: "{{ payment_path }}\\run-payment-service.ps1"

- name: Start NavalArchiveAccount scheduled task
  ansible.windows.win_shell: Start-ScheduledTask -TaskName "NavalArchiveAccount"
  args:
    executable: powershell

- name: Wait for account-service to be healthy
  ansible.windows.win_uri:
    url: "http://127.0.0.1:5005/health"
    method: GET
    status_code: 200
  register: account_health
  until: account_health.status_code | default(0) == 200
  retries: 12
  delay: 5
  failed_when: false

- name: Start NavalArchivePayment scheduled task
  ansible.windows.win_shell: Start-ScheduledTask -TaskName "NavalArchivePayment"
  args:
    executable: powershell

- name: Wait for payment-service to be healthy
  ansible.windows.win_uri:
    url: "http://127.0.0.1:5001/health"
    method: GET
    status_code: 200
  register: payment_health
  until: payment_health.status_code | default(0) == 200
  retries: 12
  delay: 5
  failed_when: false

- name: Report Go services health
  ansible.builtin.debug:
    msg: >-
      account-service: {{ 'healthy (port 5005)' if account_health.status_code | default(0) == 200 else 'not responding on port 5005' }} |
      payment-service: {{ 'healthy (port 5001)' if payment_health.status_code | default(0) == 200 else 'not responding on port 5001' }}
