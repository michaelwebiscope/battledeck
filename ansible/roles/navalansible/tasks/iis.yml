---
# Configure IIS: app pool, sites, bindings, cert, proxy
# All win_shell tasks have async timeouts to prevent deploy hangs.

# NR .NET profiler: only safe if the 64-bit profiler DLL exists.
# The NR apm-dotnet installer sets CORECLR_ENABLE_PROFILING=1 machine-wide,
# but sometimes only installs the 32-bit DLL. IIS runs 64-bit → CLR crash → 500.30.
# If the 64-bit DLL exists, leave profiler vars alone (NR .NET APM works).
# If missing, remove them to prevent 500.30.
- name: Check NR .NET 64-bit profiler DLL
  ansible.windows.win_shell: |
    $path64 = "C:\Program Files\New Relic\.NET Agent\NewRelic.Profiler.dll"
    if (Test-Path $path64) { "present" } else { "missing" }
  args:
    executable: powershell
  register: nr_profiler_64
  changed_when: false

- name: Remove NR .NET profiler vars (64-bit DLL missing — prevents 500.30)
  ansible.windows.win_shell: |
    Write-Host "64-bit profiler DLL missing — removing profiler vars to prevent 500.30"
    Remove-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\W3SVC" -Name "Environment" -Force -ErrorAction SilentlyContinue
    foreach ($v in @("COR_ENABLE_PROFILING","COR_PROFILER","COR_PROFILER_PATH_32","COR_PROFILER_PATH_64","CORECLR_ENABLE_PROFILING","CORECLR_PROFILER","CORECLR_PROFILER_PATH_32","CORECLR_PROFILER_PATH_64","CORECLR_NEWRELIC_HOME","NEWRELIC_INSTALL_PATH")) {
      [Environment]::SetEnvironmentVariable($v,$null,"Machine")
    }
    exit 0
  args:
    executable: powershell
  async: 30
  poll: 5
  failed_when: false
  when: nr_profiler_64.stdout | trim == 'missing'

- name: Report NR .NET profiler status
  ansible.builtin.debug:
    msg: "NR .NET profiler: {{ 'OK — 64-bit DLL present, IIS APM active' if nr_profiler_64.stdout | trim == 'present' else 'REMOVED — 64-bit DLL missing, run deploy with -newrelic to install' }}"

- name: Enable IIS proxy
  ansible.windows.win_shell: |
    Import-Module WebAdministration -ErrorAction SilentlyContinue
    Set-WebConfigurationProperty -pspath 'MACHINE/WEBROOT/APPHOST' -filter "system.webServer/proxy" -name "enabled" -value "True" -ErrorAction SilentlyContinue
  args:
    executable: powershell
  async: 30
  poll: 5

- name: Create NavalArchive HTTPS cert if not exists
  ansible.windows.win_shell: |
    $existing = Get-ChildItem Cert:\LocalMachine\My -ErrorAction SilentlyContinue | Where-Object { $_.FriendlyName -eq "NavalArchive HTTPS" } | Select-Object -First 1
    if (!$existing) {
      New-SelfSignedCertificate -DnsName "localhost", "127.0.0.1", "navalansible-vm" -CertStoreLocation "Cert:\LocalMachine\My" -NotAfter (Get-Date).AddYears(5) -FriendlyName "NavalArchive HTTPS"
    }
  args:
    executable: powershell
  async: 30
  poll: 5

- name: Get cert thumbprint
  ansible.windows.win_shell: |
    (Get-ChildItem Cert:\LocalMachine\My -ErrorAction SilentlyContinue | Where-Object { $_.FriendlyName -eq "NavalArchive HTTPS" } | Select-Object -First 1).Thumbprint
  args:
    executable: powershell
  register: thumbprint_out
  async: 15
  poll: 5

- name: Set cert thumbprint fact
  ansible.builtin.set_fact:
    cert_thumbprint: "{{ thumbprint_out.stdout | trim }}"

- name: Configure IIS sites (appcmd)
  ansible.windows.win_shell: |
    $appcmd = if (Test-Path "$env:windir\SysNative\inetsrv\appcmd.exe") { "$env:windir\SysNative\inetsrv\appcmd.exe" } else { "$env:windir\System32\inetsrv\appcmd.exe" }
    if (!(Test-Path $appcmd)) { exit 1 }
    # Move Default Web Site off 80
    & $appcmd set site "Default Web Site" "/bindings.[protocol='http',bindingInformation='*:80:'].bindingInformation:*:8080:" 2>$null
    & $appcmd stop site "Default Web Site" 2>$null
    & $appcmd delete site NavalArchive-API 2>$null
    & $appcmd delete apppool NavalArchive-API 2>$null
    & $appcmd delete site NavalArchive-Web 2>$null
    & $appcmd add apppool /name:NavalArchive-API "/managedRuntimeVersion:"
    & $appcmd add site /name:NavalArchive-API "/physicalPath:{{ api_path }}" "/bindings:http/*:5000:"
    & $appcmd set app "NavalArchive-API/" /applicationPool:NavalArchive-API
    & $appcmd add site /name:NavalArchive-Web "/physicalPath:{{ web_path }}" "/bindings:http/*:80:"
    & $appcmd set app "NavalArchive-Web/" /applicationPool:DefaultAppPool 2>$null
    {% for item in iis_chain_services %}
    & $appcmd stop site "{{ item.site }}" 2>$null
    & $appcmd delete site "{{ item.site }}" 2>$null
    & $appcmd delete apppool "{{ item.apppool }}" 2>$null
    & $appcmd add apppool /name:{{ item.apppool }} "/managedRuntimeVersion:"
    & $appcmd add site /name:{{ item.site }} "/physicalPath:{{ chain_paths[item.path_key] }}" "/bindings:http/*:{{ item.port }}:"
    & $appcmd set app "{{ item.site }}/" /applicationPool:{{ item.apppool }}
    {% endfor %}
    exit 0
  args:
    executable: powershell
  async: 60
  poll: 5
  when: ansible_changed | default(true)

# Only set ACLs on dirs that were actually rebuilt this run.
# icacls /T is recursive and slow — skipping unchanged dirs saves significant time.
- name: Set IIS directory permissions (icacls)
  ansible.windows.win_shell: |
    {% if api_changed | default(true) %}
    icacls "{{ api_path }}" /grant "IIS AppPool\NavalArchive-API:(OI)(CI)M" /T 2>$null
    {% endif %}
    {% if web_changed | default(true) %}
    icacls "{{ web_path }}" /grant "IIS AppPool\DefaultAppPool:(OI)(CI)RX" /T 2>$null
    {% endif %}
    {% if chain_changed | default(true) %}
    {% for item in iis_chain_services %}
    icacls "{{ chain_paths[item.path_key] }}" /grant "IIS AppPool\{{ item.apppool }}:(OI)(CI)M" /T 2>$null
    {% endfor %}
    {% endif %}
    exit 0
  args:
    executable: powershell
  async: 300
  poll: 10
  failed_when: false
  ignore_unreachable: true
  when: api_changed | default(true) or web_changed | default(true) or chain_changed | default(true)

- name: Add HTTPS binding to NavalArchive-Web
  ansible.windows.win_shell: |
    try {
      Import-Module IISAdministration -ErrorAction SilentlyContinue
      $existing = Get-IISSiteBinding -Name "NavalArchive-Web" -ErrorAction SilentlyContinue | Where-Object { $_.Protocol -eq "https" }
      if (-not $existing) {
        New-IISSiteBinding -Name "NavalArchive-Web" -BindingInformation "*:443:" -CertificateThumbPrint "{{ cert_thumbprint }}" -CertStoreLocation "Cert:\LocalMachine\My" -Protocol https -ErrorAction Stop
      }
    } catch {
      New-WebBinding -Name "NavalArchive-Web" -Protocol https -Port 443 -ErrorAction SilentlyContinue
      $b = Get-WebBinding -Name "NavalArchive-Web" -Protocol "https" -ErrorAction SilentlyContinue
      if ($b) { $b.AddSslCertificate("{{ cert_thumbprint }}", "My") }
    }
  args:
    executable: powershell
  async: 30
  poll: 5
  failed_when: false
  when: ansible_changed | default(true)

- name: IIS reset
  ansible.windows.win_shell: |
    $iisreset = if (Test-Path "$env:windir\SysNative\inetsrv\iisreset.exe") { "$env:windir\SysNative\inetsrv\iisreset.exe" } else { "$env:windir\System32\inetsrv\iisreset.exe" }
    if (Test-Path $iisreset) {
      # Try restart; if W3SVC was already stopped (iisreset /stop ran earlier), fall back to /start
      & $iisreset /noforce 2>$null
      if ($LASTEXITCODE -ne 0) { & $iisreset /start 2>$null }
    }
    $appcmd = if (Test-Path "$env:windir\SysNative\inetsrv\appcmd.exe") { "$env:windir\SysNative\inetsrv\appcmd.exe" } else { "$env:windir\System32\inetsrv\appcmd.exe" }
    & $appcmd stop site "Default Web Site" 2>$null
    exit 0
  args:
    executable: powershell
  async: 60
  poll: 5
  failed_when: false
  when: code_changed | default(true)
