---
# Run ImagePopulator (Java) to fetch ship images from Wikipedia and upload to API
# Requires: Java 17 (Corretto or Adoptium), API running on localhost:5000
# All tasks use ignore_unreachable to prevent WinRM timeouts from killing the deploy.

- name: Get src_path from clone (for populate-only runs)
  ansible.windows.win_shell: |
    $dir = Get-ChildItem "{{ clone_path }}" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
    if ($dir) { $dir.FullName }
  args:
    executable: powershell
  register: src_path_check
  when: src_path is not defined or src_path == ''

- name: Set src_path from clone
  ansible.builtin.set_fact:
    src_path: "{{ src_path_check.stdout_lines[0] | trim }}"
  when: (src_path is not defined or src_path == '') and src_path_check.stdout | trim | length > 0

- name: Ensure IIS and NavalArchive-API site are started
  ansible.windows.win_shell: |
    # Full IIS restart to pick up any env var / config changes
    iisreset /restart 2>$null
    Start-Sleep -Seconds 5
    $appcmd = if (Test-Path "$env:windir\SysNative\inetsrv\appcmd.exe") { "$env:windir\SysNative\inetsrv\appcmd.exe" } else { "$env:windir\System32\inetsrv\appcmd.exe" }
    if (Test-Path $appcmd) {
      & $appcmd start apppool NavalArchive-API 2>$null
      & $appcmd start site NavalArchive-API 2>$null
      & $appcmd stop site "Default Web Site" 2>$null
    }
    exit 0
  args:
    executable: powershell
  async: 60
  poll: 5
  ignore_unreachable: true
  failed_when: false

- name: Wait for API to be ready (ImagePopulator needs it)
  ansible.windows.win_uri:
    url: http://127.0.0.1:5000/health
    method: GET
    timeout: 5
  register: api_ready
  until: api_ready.status_code | default(0) == 200
  retries: 24
  delay: 5
  ignore_unreachable: true
  failed_when: false

- name: Find ImagePopulator jar in clone
  ansible.windows.win_shell: |
    $jar = Get-ChildItem "{{ src_path }}" -Filter "image-populator-*.jar" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
    if ($jar) { $jar.FullName }
  args:
    executable: powershell
  register: jar_result
  ignore_unreachable: true

- name: Find Java 17 (Corretto or Adoptium)
  ansible.windows.win_shell: |
    $javaExe = $null
    foreach ($base in @("C:\Program Files\Amazon Corretto", "C:\Program Files\Eclipse Adoptium")) {
      if (Test-Path $base) {
        $jdk = Get-ChildItem $base -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "jdk*" } | Select-Object -First 1
        if ($jdk -and (Test-Path "$($jdk.FullName)\bin\java.exe")) {
          $javaExe = "$($jdk.FullName)\bin\java.exe"
          break
        }
      }
    }
    if ($javaExe) { $javaExe } else { "java" }
  args:
    executable: powershell
  register: java_result
  ignore_unreachable: true

- name: Ensure New Relic Java agent directory exists
  ansible.windows.win_file:
    path: "{{ newrelic_java_agent_dir | default('C:\\ProgramData\\NewRelic\\java') }}"
    state: directory
  when: newrelic_license_key is defined and newrelic_license_key | length > 0

- name: Download New Relic Java agent jar
  ansible.windows.win_get_url:
    url: https://download.newrelic.com/newrelic/java-agent/newrelic-agent/current/newrelic.jar
    dest: "{{ newrelic_java_agent_dir | default('C:\\ProgramData\\NewRelic\\java') }}\\newrelic.jar"
  when: newrelic_license_key is defined and newrelic_license_key | length > 0

- name: Run ImagePopulator (populate ship images from Wikipedia)
  ansible.windows.win_shell: |
    $jar = "{{ jar_result.stdout | trim }}"
    $java = "{{ java_result.stdout | trim }}"
    $javaArgs = @()
    $nrJar = "{{ newrelic_java_agent_dir | default('C:\\ProgramData\\NewRelic\\java') }}\newrelic.jar"
    if ("{{ newrelic_license_key | default('') }}" -and (Test-Path $nrJar)) {
      $javaArgs += "-javaagent:$nrJar"
      $javaArgs += "-Dnewrelic.config.license_key={{ newrelic_license_key }}"
      $javaArgs += "-Dnewrelic.config.app_name={{ newrelic_java_app_name | default('NavalArchiveImagePopulator') }}"
      $javaArgs += "-Dnewrelic.config.distributed_tracing.enabled=true"
    }
    if ($jar -and (Test-Path $jar)) {
      $javaArgs += "-jar"
      $javaArgs += $jar
      $javaArgs += "http://localhost:5000"
      & $java @javaArgs
      exit $LASTEXITCODE
    } else {
      Write-Host "ImagePopulator jar not found - skipping"
      exit 0
    }
  args:
    executable: powershell
  when:
    - run_image_populator | default(false)
    - jar_result.stdout | default('') | trim | length > 0
  failed_when: false
  register: populate_result

- name: Report ImagePopulator result
  ansible.builtin.debug:
    msg: >-
      ImagePopulator:
      {{ 'Ran with New Relic Java agent' if (run_image_populator | default(false)) and (jar_result.stdout | default('') | trim | length > 0) else 'Skipped' }}
  when: jar_result.stdout | default('') | trim | length > 0
