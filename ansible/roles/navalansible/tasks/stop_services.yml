---
# Stop and remove Naval Archive services, kill processes
# Uses ignore_unreachable on all tasks to survive WinRM drops.

- name: Stop and remove Naval Archive services
  ansible.windows.win_shell: |
    $svcs = @(
      "NavalArchivePayment", "NavalArchiveCard", "NavalArchiveCart", "NavalArchiveWeb", "NavalArchiveImagePopulator",
      "NavalArchiveGateway", "NavalArchiveAuth", "NavalArchiveUser", "NavalArchiveCatalog",
      "NavalArchiveInventory", "NavalArchiveBasket", "NavalArchiveOrder", "NavalArchivePaymentChain",
      "NavalArchiveShipping", "NavalArchiveNotification"
    )
    foreach ($s in $svcs) {
      sc.exe stop $s 2>$null
      sc.exe delete $s 2>$null
    }
  args:
    executable: powershell
  async: 120
  poll: 5
  failed_when: false
  ignore_unreachable: true

- name: Stop Go scheduled tasks before killing processes
  ansible.windows.win_shell: |
    Stop-ScheduledTask -TaskName "NavalArchiveAccount" -ErrorAction SilentlyContinue
    Stop-ScheduledTask -TaskName "NavalArchivePayment" -ErrorAction SilentlyContinue
    Stop-ScheduledTask -TaskName "NavalArchiveImagePopulator" -ErrorAction SilentlyContinue
    Start-Sleep -Seconds 2
  args:
    executable: powershell
  async: 60
  poll: 5
  failed_when: false
  ignore_unreachable: true

- name: Stop IIS API site and kill processes (release file locks for build)
  ansible.windows.win_shell: |
    $appcmd = if (Test-Path "$env:windir\SysNative\inetsrv\appcmd.exe") { "$env:windir\SysNative\inetsrv\appcmd.exe" } else { "$env:windir\System32\inetsrv\appcmd.exe" }
    # Only stop the API site/pool — keep W3SVC running so WinRM stays responsive
    if (Test-Path $appcmd) {
      & $appcmd stop site NavalArchive-API 2>$null
      & $appcmd stop apppool NavalArchive-API 2>$null
      {% for item in iis_chain_services %}
      & $appcmd stop site "{{ item.site }}" 2>$null
      & $appcmd stop apppool "{{ item.apppool }}" 2>$null
      {% endfor %}
    }
    Start-Sleep -Seconds 2
    # Kill processes that may hold file locks
    taskkill /F /IM node.exe 2>$null
    Get-CimInstance Win32_Process -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -like "*navalarchive*" -or $_.CommandLine -like "*image-populator*" } | ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
    taskkill /F /IM java.exe 2>$null
    taskkill /F /IM NavalArchive.PaymentSimulation.exe 2>$null
    taskkill /F /IM NavalArchive.CardService.exe 2>$null
    taskkill /F /IM NavalArchive.CartService.exe 2>$null
    taskkill /F /IM NavalArchive.Gateway.exe 2>$null
    taskkill /F /IM NavalArchive.Auth.exe 2>$null
    taskkill /F /IM NavalArchive.UserService.exe 2>$null
    taskkill /F /IM NavalArchive.Catalog.exe 2>$null
    taskkill /F /IM NavalArchive.Inventory.exe 2>$null
    taskkill /F /IM NavalArchive.Basket.exe 2>$null
    taskkill /F /IM NavalArchive.Order.exe 2>$null
    taskkill /F /IM NavalArchive.Payment.exe 2>$null
    taskkill /F /IM NavalArchive.Shipping.exe 2>$null
    taskkill /F /IM NavalArchive.Notification.exe 2>$null
  args:
    executable: powershell
  async: 60
  poll: 5
  failed_when: false
  ignore_unreachable: true

- name: Pause for processes to exit
  ansible.builtin.pause:
    seconds: 10
