name: NR Change Tracking

on:
  push:
    branches: [main]

jobs:
  change-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed components
        id: changed
        run: |
          # Map repo paths to New Relic entity name substrings (lowercase)
          # Entity names are like "NavalArchive API", "NavalArchive Payment", etc.
          CHANGED=""
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^payment-service/'; then
            CHANGED="${CHANGED}payment "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^account-service/'; then
            CHANGED="${CHANGED}account "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^NavalArchive\.Api/|^NavalArchive\.Api\\'; then
            CHANGED="${CHANGED}api "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^NavalArchive\.Web/|^NavalArchive\.Web\\'; then
            CHANGED="${CHANGED}web "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^NavalArchive\.CardService/'; then
            CHANGED="${CHANGED}card "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^NavalArchive\.CartService/'; then
            CHANGED="${CHANGED}cart "
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^NavalArchive\.ImagePopulator/|^NavalArchive\.ImagePopulator\\'; then
            CHANGED="${CHANGED}imagepopulator "
          fi
          # If no known components changed, skip (no markers)
          echo "components=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed components: '$CHANGED'"

      - name: Query NavalArchive entity GUIDs
        id: entities
        if: steps.changed.outputs.components != ''
        run: |
          if [ -z "${{ secrets.NR_API_KEY }}" ]; then
            echo "NR_API_KEY secret not set — skipping change tracking"
            echo "response=" >> $GITHUB_OUTPUT
            exit 0
          fi
          RESPONSE=$(curl -s -X POST https://api.newrelic.com/graphql \
            -H "API-Key: ${{ secrets.NR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ actor { entitySearch(query: \\\"accountId = '${{ secrets.NR_ACCOUNT_ID }}' AND type = 'APPLICATION' AND name LIKE 'NavalArchive%'\\\") { results { entities { guid name } } } } }\" }")
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "NR API error: $RESPONSE"
            exit 1
          fi
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Create deployment markers (changed entities only)
        if: steps.entities.outputs.response != ''
        env:
          CHANGED_COMPONENTS: ${{ steps.changed.outputs.components }}
        run: |
          ENTITIES=$(echo '${{ steps.entities.outputs.response }}' | \
            jq -r '.data.actor.entitySearch.results.entities[] | .guid + ":" + .name')
          for ENTRY in $ENTITIES; do
            GUID="${ENTRY%%:*}"
            NAME="${ENTRY##*:}"
            NAME_LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
            MARK=
            for comp in $CHANGED_COMPONENTS; do
              if echo "$NAME_LOWER" | grep -q "$comp"; then
                MARK=1
                break
              fi
            done
            if [ -n "$MARK" ]; then
              echo "Marking $NAME ($GUID)"
              curl -s -X POST https://api.newrelic.com/graphql \
                -H "API-Key: ${{ secrets.NR_API_KEY }}" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { changeTrackingCreateDeployment(deployment: { entityGuid: \\\"$GUID\\\", version: \\\"${{ github.sha }}\\\", description: \\\"Push to main by ${{ github.actor }}\\\", user: \\\"${{ github.actor }}\\\", deploymentType: BASIC }) { deploymentId } }\" }"
            else
              echo "Skipping $NAME (no changes)"
            fi
          done
